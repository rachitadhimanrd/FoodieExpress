{% extends 'base.html' %}
{% block title %}Login - Foodie Express{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">👋</span>
            <h1>Welcome Back</h1>
            <p>Login to continue ordering delicious food</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="login-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
