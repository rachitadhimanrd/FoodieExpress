{% extends 'base.html' %}
{% block title %}Sign Up - Foodie Express{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <span class="auth-icon">🚀</span>
            <h1>Create Account</h1>
            <p>Join FoodieExpress and start ordering</p>
        </div>
        <form method="POST" action="{{ url_for('auth.signup') }}" class="auth-form" id="signup-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone"></i> Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="9876543210">
                </div>
                <div class="form-group">
                    <label for="address"><i class="fas fa-map-marker-alt"></i> Address</label>
                    <input type="text" id="address" name="address" placeholder="Your delivery address">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
